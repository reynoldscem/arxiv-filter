<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}arXiv Papers{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.21/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.21/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.21/dist/contrib/auto-render.min.js"
        onload="renderMathInElement(document.body, {delimiters:[{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false},{left:'\\\\(',right:'\\\\)',display:false},{left:'\\\\[',right:'\\\\]',display:true}],throwOnError:false});">
    </script>
    <script defer src="{{ url_for('static', filename='alpine.min.js') }}"></script>
</head>
<body>
    <nav>
        <a href="{{ url_for('index') }}" class="nav-brand">arXiv Papers</a>
        <div class="nav-links">
            <a href="{{ url_for('index') }}" {% if request.endpoint in ('index', 'papers_by_date') %}class="active"{% endif %}>Daily</a>
            <a href="{{ url_for('favourites') }}" {% if request.endpoint == 'favourites' %}class="active"{% endif %}>Favourites</a>
        </div>
    </nav>
    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
